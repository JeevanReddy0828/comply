services:
  postgres:
    image: postgres:16
    container_name: comply-postgres
    environment:
      POSTGRES_USER: comply
      POSTGRES_PASSWORD: comply
      POSTGRES_DB: comply
    ports:
      - "5432:5432"
    volumes:
      - comply_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comply"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  comply_pgdata:
